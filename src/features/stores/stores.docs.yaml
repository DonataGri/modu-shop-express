tags:
  - name: Stores
    description: Store management

paths:
  /stores:
    get:
      tags: [Stores]
      summary: Get all stores for the authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of stores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Store"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags: [Stores]
      summary: Create a new store
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStoreDto"
      responses:
        "201":
          description: Store created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /stores/{storeId}:
    get:
      tags: [Stores]
      summary: Get a store by ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/storeId"
      responses:
        "200":
          description: Store found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      tags: [Stores]
      summary: Update a store (OWNER only)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/storeId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStoreDto"
      responses:
        "200":
          description: Store updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [Stores]
      summary: Delete a store (OWNER only)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/storeId"
      responses:
        "204":
          description: Store deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  parameters:
    storeId:
      name: storeId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    Store:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateStoreDto:
      type: object
      required: [name, description]
      properties:
        name:
          type: string
          maxLength: 100
        description:
          type: string
          maxLength: 500

    UpdateStoreDto:
      type: object
      required: [name, description]
      properties:
        name:
          type: string
          maxLength: 100
        description:
          type: string
          maxLength: 500

  responses:
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
    Unauthorized:
      description: Missing or invalid JWT
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
